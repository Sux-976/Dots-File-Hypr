# #######################################################################################
# CONFIGURAÇÃO PERSONALIZADA HYPRLAND - ESTILO DARK GREEN (QUADRADO)
# #######################################################################################

# --- MONITORES ---
monitor=,preferred,auto,1

# --- PROGRAMAS PADRÃO ---
$terminal = kitty
$fileManager = dolphin
$menu = wofi --show drun -i
$browser = firefox

# --- AUTOSTART ---
exec-once = waybar
exec-once = swaync
exec-once = swww-daemon
exec-once = swww img /home/ramon/Imagens/wp13199765-dark-minimalist-pc-wallpapers.jpg
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = eww daemon

# --- VARIÁVEIS DE AMBIENTE ---
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = GDK_BACKEND,wayland,x11

# --- INPUT ---
input {
    kb_layout = br
    kb_options = scrolllock:pckbd
    follow_mouse = 1
    sensitivity = 0
}

# --- ESTÉTICA ---
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 0

    # Verde Spotify para janela ativa e cinza escuro para inativa
    col.active_border = rgb(1DB954)
    col.inactive_border = rgba(313244aa)

    layout = dwindle
}

# --- DECORAÇÃO ---
decoration {
    rounding = 0 # <--- Janelas totalmente quadradas

    blur {
        enabled = true
        size = 3
        passes = 1
        new_optimizations = true
    }

    shadow {
        enabled = true
        range = 10
        render_power = 3
        # Sombra neutra (preta) sem brilho verde
        color = rgba(0, 0, 0, 0.6)
    }
}

# --- ANIMAÇÕES ---
animations {
    enabled = yes
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# --- LAYOUTS ---
dwindle {
    pseudotile = yes
    preserve_split = yes
}

master {
    new_status = master
}

# --- ATALHOS DE TECLADO ---
$mainMod = SUPER

# Menu de Som (Eww) e Notificações
bind = $mainMod, N, exec, swaync-client -t -sw
bind = $mainMod, A, exec, eww open --toggle audio_menu

# Volume e Mídia
binde = , F8, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
binde = , F9, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , F10, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Apps e Sistema
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, F, exec, $browser
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, pseudo,
bind = $mainMod, J, togglesplit,

# Movimentação de Foco
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Workspaces (1-9)
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

# Mover janela para Workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# Mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Screenshots
bind = , Print, exec, grim - | wl-copy && notify-send "Screenshot" "Captura da tela inteira copiada!"
bind = $mainMod, Print, exec, grim -g "$(slurp)" - | swappy -f -
bind = SHIFT, Print, exec, grim -g "$(slurp)" - | wl-copy && notify-send "Screenshot" "Área copiada para o clipboard!"
